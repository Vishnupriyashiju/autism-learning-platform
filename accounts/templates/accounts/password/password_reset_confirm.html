{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Password | NeuroSkills</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <style>
        body { background: url("{% static 'img/about.jpg' %}") no-repeat center fixed; background-size: cover; min-height: 100vh; display: flex; align-items: center; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border-radius: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.1); overflow: hidden; }
        .header-pink { background: linear-gradient(45deg, #f06292, #ec407a); padding: 30px; color: white; text-align: center; }
        .btn-pink { background: linear-gradient(45deg, #f06292, #ec407a); color: white; border: none; border-radius: 15px; padding: 12px; font-weight: bold; width: 100%; }
        .form-control { border-radius: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card">
                <div class="header-pink">
                    <h4 class="fw-bold mb-0">Set New Password</h4>
                </div>
                <div class="p-5">
                    {% if validlink %}
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-pink mt-3">CHANGE PASSWORD</button>
                    </form>
                    {% else %}
                    <div class="text-center">
                        <p class="text-danger">The password reset link is invalid, possibly because it has already been used.</p>
                        <a href="{% url 'password_reset' %}" class="btn btn-secondary rounded-pill px-4">Request new link</a>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
