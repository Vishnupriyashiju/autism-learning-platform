{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Sent | NeuroSkills</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: url("{% static 'img/about.jpg' %}") no-repeat center fixed; background-size: cover; min-height: 100vh; display: flex; align-items: center; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card p-5">
                <i class="fas fa-paper-plane fa-4x mb-4" style="color: #f06292;"></i>
                <h3 class="fw-bold text-dark mb-3">Check Your Email</h3>
                <p class="text-muted">We've emailed you instructions for setting your password. If you don't receive it soon, please check your spam folder.</p>
                <a href="{% url 'login' %}" class="btn btn-outline-secondary rounded-pill px-4 mt-3">Return to Login</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
