{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | NeuroSkills</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: url("{% static 'img/about.jpg' %}") no-repeat center fixed; background-size: cover; min-height: 100vh; display: flex; align-items: center; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 25px 50px rgba(0,0,0,0.1); overflow: hidden; }
        .header-pink { background: linear-gradient(45deg, #f06292, #ec407a); padding: 30px; color: white; text-align: center; }
        .btn-pink { background: linear-gradient(45deg, #f06292, #ec407a); color: white; border: none; border-radius: 15px; padding: 12px; font-weight: bold; transition: 0.3s; }
        .btn-pink:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(240, 98, 146, 0.4); color: white; }
        .form-control { border-radius: 15px; padding: 12px; border: 1px solid #eee; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card">
                <div class="header-pink">
                    <h4 class="fw-bold mb-0">Reset Password</h4>
                    <small class="opacity-75">We'll send a link to your inbox</small>
                </div>
                <div class="p-5">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="small fw-bold text-muted mb-2">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="Enter registered email" required>
                        </div>
                        <button type="submit" class="btn btn-pink w-100 mb-3">SEND RESET LINK</button>
                        <div class="text-center">
                            <a href="{% url 'login' %}" class="text-decoration-none small fw-bold" style="color: #f06292;">Back to Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
