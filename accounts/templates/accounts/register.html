{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | NeuroSkills</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root {
            --pink-primary: #f06292;
            --pink-grad: linear-gradient(45deg, #f06292, #ec407a);
        }

        body {
            background: url("{% static 'img/background.jpg' %}") no-repeat center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            width: 100%;
            max-width: 750px;
        }

        .reg-header {
            background: var(--pink-grad);
            padding: 35px;
            color: white;
            text-align: center;
        }

        .section-title {
            color: var(--pink-primary);
            font-weight: 700;
            border-bottom: 2px solid #fce4ec;
            padding-bottom: 5px;
            margin-bottom: 20px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
            background: #fff;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--pink-primary);
            box-shadow: 0 0 0 4px rgba(240, 98, 146, 0.1);
            outline: none;
        }

        .photo-preview-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #fce4ec;
            overflow: hidden;
            margin: 0 auto 15px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #imagePreview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .btn-register {
            background: var(--pink-grad);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 15px;
            font-weight: 700;
            transition: 0.4s;
            letter-spacing: 1px;
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(240, 98, 146, 0.3);
            color: white;
        }

        .hidden-section { display: none; }
        .role-selector-box { background: #fff5f8; padding: 20px; border-radius: 20px; border: 1px solid #fce4ec; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center px-3">
    <div class="glass-card animate__animated animate__fadeInUp">
        <div class="reg-header">
            <h3 class="fw-bold mb-0">Join NeuroSkills</h3>
            <p class="small mb-0 opacity-75">Start your personalized journey today</p>
        </div>

        <form method="post" enctype="multipart/form-data" class="p-4 p-md-5">
            {% csrf_token %}
            
            <div class="role-selector-box text-center mb-4">
                <label class="small fw-bold text-muted d-block mb-2 text-uppercase">Who are you?</label>
                <select name="role" id="roleSelect" class="form-select form-select-lg text-center fw-bold border-2" style="border-color: var(--pink-primary)" required onchange="toggleSections()">
                    <option value="" disabled selected>Select Your Role</option>
                    <option value="PARENT">I am a Parent / Guardian</option>
                    <option value="CONTRIBUTOR">I am a Content Specialist</option>
                </select>
            </div>

            <div class="text-center mb-4">
                <div class="photo-preview-container shadow-sm">
                    <i class="fas fa-user fa-3x text-muted" id="placeholderIcon"></i>
                    <img id="imagePreview" src="#" alt="Preview">
                </div>
                <label for="profile_photo" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
                    <i class="fas fa-camera me-1"></i> Upload Profile Photo
                </label>
                <input type="file" name="profile_photo" id="profile_photo" class="d-none" accept="image/*" onchange="previewImage(this)">
            </div>

            <div class="section-title"><i class="fas fa-id-card me-2"></i>Account Information</div>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <input type="text" name="full_name" class="form-control" placeholder="Full Name" required>
                </div>
                <div class="col-md-6">
                    <input type="email" name="email" class="form-control" placeholder="Email Address" required>
                </div>
                <div class="col-md-6">
                    <input type="tel" name="phone" class="form-control" placeholder="Contact Number" required>
                </div>
                <div class="col-md-6">
                    <input type="text" name="location" class="form-control" placeholder="Country / Location" required>
                </div>
                <div class="col-md-6">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
                <div class="col-md-6">
                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
                </div>
            </div>

            <div id="parentFields" class="hidden-section animate__animated animate__fadeIn">
                <div class="section-title"><i class="fas fa-user-friends me-2"></i>Parental Profile</div>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <select name="relationship" class="form-select">
                            <option value="" selected disabled>Relationship to Child</option>
                            <option value="Mother">Mother</option>
                            <option value="Father">Father</option>
                            <option value="Guardian">Legal Guardian</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <select name="contact_pref" class="form-select">
                            <option value="" selected disabled>How should we contact you?</option>
                            <option value="Email">Email Notifications</option>
                            <option value="SMS">SMS Alerts</option>
                            <option value="Both">Both</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="contributorFields" class="hidden-section animate__animated animate__fadeIn">
                <div class="section-title"><i class="fas fa-briefcase me-2"></i>Professional Background</div>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <input type="text" name="qualification" class="form-control" placeholder="Highest Degree/Certification">
                    </div>
                    <div class="col-md-6">
                        <input type="number" name="experience" class="form-control" placeholder="Years of Experience">
                    </div>
                    <div class="col-12">
                        <select name="specialization" class="form-select">
                            <option value="" selected disabled>Specialization</option>
                            <option value="Speech therapy">Speech therapy</option>
                            <option value="Occupational therapy">Occupational therapy</option>
                            <option value="Autism education">Autism education</option>
                            <option value="ADHD support">ADHD support</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <input type="url" name="portfolio_url" class="form-control" placeholder="Portfolio link (optional)">
                    </div>
                    <div class="col-md-12 mt-3">
                        <label class="small fw-bold text-muted mb-2">Upload certificate (Verification)</label>
                        <input type="file" name="certificate" class="form-control">
                    </div>
                </div>
            </div>

            <div class="p-3 bg-light rounded-4 mb-4">
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" name="data_privacy" id="data_privacy" required>
                    <label class="form-check-label small text-muted" for="data_privacy">
                        I agree to the data privacy agreement.
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="progress_tracking" id="progress_tracking" required>
                    <label class="form-check-label small text-muted" for="progress_tracking">
                        I give permission to track progress for learning improvement.
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-register w-100 mb-3 shadow">REGISTER ACCOUNT</button>
            
            <div class="text-center">
                <span class="text-muted small">Already a member?</span>
                <a href="{% url 'login' %}" class="fw-bold text-pink text-decoration-none ms-1">Sign In</a>
            </div>
        </form>
    </div>
</div>

<script>
    // Logic to toggle sections based on role
    function toggleSections() {
        const role = document.getElementById('roleSelect').value;
        const parentDiv = document.getElementById('parentFields');
        const contributorDiv = document.getElementById('contributorFields');

        if (role === 'PARENT') {
            parentDiv.style.display = 'block';
            contributorDiv.style.display = 'none';
        } else if (role === 'CONTRIBUTOR') {
            parentDiv.style.display = 'none';
            contributorDiv.style.display = 'block';
        }
    }

    // JS to handle image preview
    function previewImage(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('placeholderIcon').style.display = 'none';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

</body>
</html>
