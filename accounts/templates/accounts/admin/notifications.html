{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm rounded-4 p-5">
                <h4 class="fw-bold text-dark mb-4 text-center"><i class="fas fa-bullhorn text-pink me-2"></i>Send System-Wide Notification</h4>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-bold">Announcement Message</label>
                        <textarea name="message" class="form-control rounded-4 border-2" rows="5" placeholder="Type the update for parents and contributors here..." required></textarea>
                    </div>
                    <div class="alert alert-soft-pink small mb-4">
                        <i class="fas fa-info-circle me-2"></i> This message will be displayed on the dashboards of all active users.
                    </div>
                    <button type="submit" class="btn btn-pink w-100 rounded-pill py-3 fw-bold shadow">SEND GLOBAL NOTIFICATION</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
