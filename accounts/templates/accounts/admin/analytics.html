{% extends "base.html" %}
{% block content %}
<div class="container-fluid py-4" style="background-color: #f8f9fa; min-height: 100vh;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="fas fa-chart-line text-pink me-2"></i>System Analysis</h2>
        <a href="{% url 'role_dashboard' %}" class="btn btn-outline-secondary rounded-pill btn-sm">
            <i class="fas fa-arrow-left me-1"></i> Back to Dashboard
        </a>
    </div>

    <div class="row mb-5">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
                <h5 class="fw-bold mb-4">Activity Progress Trends</h5>
                <canvas id="progressChart" height="250"></canvas> </div>
        </div>
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm rounded-4 p-4 bg-white h-100">
                <h5 class="fw-bold mb-3">Live System Engagement</h5>
                <div class="text-center mt-4">
                    <h1 class="display-4 fw-bold text-pink">{{ completed_tasks }}</h1>
                    <p class="text-muted">Total Task Completions</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('progressChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
            datasets: [{
                label: 'Student Activity',
                data: [5, 12, 8, 15, 10, 20, 18], 
                borderColor: '#f06292',
                backgroundColor: 'rgba(240, 98, 146, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });
</script>
{% endblock %}
