{% extends "base.html" %}
{% load static %}

{% block title %}NeuroSkills | Create Student Profile{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-11">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="row g-0">
                    
                    <div class="col-md-4 d-none d-md-block position-relative">
                        <img src="{% static 'img/program-1.jpg' %}" class="w-100 h-100" style="object-fit: cover;" alt="Child Learning">
                        <div class="position-absolute top-0 start-0 w-100 h-100" style="background: rgba(240, 98, 146, 0.4); backdrop-filter: blur(2px);">
                            <div class="d-flex flex-column justify-content-center align-items-center h-100 text-white p-4 text-center">
                                <i class="fas fa-graduation-cap fa-3x mb-3"></i>
                                <h3 class="fw-bold">Student Profile</h3>
                                <p class="small">Precision profiles lead to better learning outcomes.</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-8 bg-white p-5">
                        <h2 class="text-dark fw-bold mb-4">Personalize the Journey</h2>

                        <form method="post" class="animate__animated animate__fadeIn">
                            {% csrf_token %}

                            <div class="row g-3">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-dark small">STUDENT NAME</label>
                                    <input class="form-control border-0 bg-light py-2" name="name" placeholder="Full Name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-dark small">AGE</label>
                                    <input class="form-control border-0 bg-light py-2" type="number" name="age" placeholder="Age" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-dark small">LEARNING STYLE</label>
                                    <select class="form-select border-0 bg-light py-2" name="learning_style">
                                        <option value="visual">Visual (Videos/Images)</option>
                                        <option value="audio">Auditory (Sound/Music)</option>
                                        <option value="activity">Kinesthetic (Games/Touch)</option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-dark small">SENSORY MODE</label>
                                    <select class="form-select border-0 bg-light py-2" name="sensory_mode">
                                        <option value="low">Low Stimulation (Calm)</option>
                                        <option value="high">High Engagement (Vibrant)</option>
                                        <option value="neutral">Standard</option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-dark small">PRIMARY FOCUS AREA</label>
                                    <input class="form-control border-0 bg-light py-2" name="diagnosis" placeholder="e.g. Social Skills, Communication">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-dark small">REWARD SYSTEM</label>
                                    <select class="form-select border-0 bg-light py-2" name="reward_pref">
                                        <option value="stars">Star Badges</option>
                                        <option value="points">Unlockable Activities</option>
                                        <option value="visual">Visual Fireworks</option>
                                    </select>
                                </div>

                                <div class="col-12 mb-4">
                                    <label class="form-label fw-bold text-dark small">SENSORY TRIGGERS / NOTES</label>
                                    <textarea class="form-control border-0 bg-light py-2" name="notes" rows="2" placeholder="List any triggers or special interests..."></textarea>
                                </div>
                            </div>

                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-pink px-5 py-3 fw-bold rounded-pill shadow-sm w-100">
                                    Create Profile
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
