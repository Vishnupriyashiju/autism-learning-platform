{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container-fluid min-vh-100 py-5" style="background: #fffafa;">
    <div class="container text-center mb-5">
        <h4 class="text-pink fw-bold">PORTAL ACTIVE: {{ child.name|upper }}</h4>
        <h1 class="display-5 fw-bold text-dark">Select a Focus Area</h1>
        <p class="text-muted">Click an icon to view available lessons for that skill.</p>
    </div>

    <div class="container">
        <div class="row g-4 justify-content-center">
            {% for skill in skills %}
            <div class="col-6 col-md-4 col-lg-3">
                <a href="{% url 'skill_lessons_view' child.id skill.slug %}" class="skill-card-link">
                    <div class="card border-0 shadow-sm rounded-4 p-4 h-100 text-center skill-card-inner">
                        <i class="fas {{ skill.icon }} fa-3x text-pink mb-3"></i>
                        <h5 class="fw-bold text-dark mb-0">{{ skill.name }}</h5>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<style>
    .skill-card-link { text-decoration: none; transition: transform 0.3s ease; display: block; }
    .skill-card-link:hover { transform: translateY(-10px); }
    .skill-card-inner { transition: all 0.3s ease; border: 2px solid transparent !important; }
    .skill-card-link:hover .skill-card-inner { background: #fce4ec; border-color: #f06292 !important; }
    .text-pink { color: #f06292 !important; }
</style>
{% endblock %}
