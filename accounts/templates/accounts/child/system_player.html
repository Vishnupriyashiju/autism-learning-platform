{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-soft-pink">
    <div class="container py-5">
        <div id="game-stage" class="card border-0 shadow-lg rounded-5 p-4 p-lg-5 bg-white text-center">
            
            <div id="header-area" class="mb-4 animate__animated animate__fadeInDown">
                <span class="badge bg-soft-pink text-pink rounded-pill px-3 py-2 mb-2 text-uppercase fw-bold">
                    <i class="fas fa-brain me-1"></i> {{ lesson.skill_category }}
                </span>
                <h1 class="display-5 fw-bold text-pink" id="game-title">Loading...</h1>
                <p class="text-muted fs-5 mb-0" id="game-instruction">Initializing activity.</p>
            </div>

            <div id="activity-container" class="d-flex flex-wrap justify-content-center align-items-center gap-4 py-4 mb-4 min-vh-50">
                {% if lesson.video_url and lesson.youtube_id %}
                    <div class="ratio ratio-16x9 w-100 rounded-4 overflow-hidden shadow">
                        <iframe src="https://www.youtube.com/embed/{{ lesson.youtube_id }}?rel=0" 
                                title="YouTube video player" frameborder="0" 
                                allowfullscreen></iframe>
                    </div>
                {% elif lesson.file and mode == 'view' %}
                    <video controls class="w-100 rounded-4 shadow">
                        <source src="{{ lesson.file.url }}" type="video/mp4">
                    </video>
                {% endif %}
            </div>

            {% if mode == 'view' %}
            <div id="manual-complete" class="mt-3">
                <button onclick="finishLevel()" class="btn btn-pink btn-lg px-5 rounded-pill fw-bold shadow">
                    <i class="fas fa-check-circle me-2"></i> I FINISHED THE LESSON
                </button>
            </div>
            {% endif %}

            <div class="mt-5 pt-4 border-top">
                <a href="{% url 'exit_child_gate' %}" class="btn btn-outline-secondary rounded-pill px-4">
                    <i class="fas fa-lock me-2"></i> Parent Exit
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    const mediaUrl = "{% if lesson.file %}{{ lesson.file.url }}{% else %}{% endif %}";
    const mode = "{{ mode }}";
    const container = document.getElementById('activity-container');
    const title = document.getElementById('game-title');
    const instruction = document.getElementById('game-instruction');

    // NEW Logic: Integrated AJAX completion with Redirect
    function finishLevel() {
        const lessonId = "{{ lesson.id }}";
        
        fetch(`/activity/complete/${lessonId}/`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}', // CRITICAL: Prevents 403/500 errors
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                alert("Great Job! You earned 3 stars!");
                // Direct redirect to portal after success
                {% if child %}
                    window.location.href = "{% url 'skill_selection_portal' child.id %}";
                {% else %}
                    window.location.href = "{% url 'admin_dashboard' %}";
                {% endif %}
            }
        })
        .catch(err => {
            console.error("Tracking Error:", err);
            alert("Progress saved locally.");
        });
    }

    function initMatching() {
        title.innerText = "🧩 Picture Match";
        instruction.innerText = "Tap both identical items!";
        let count = 0;
        [1, 2].forEach(() => {
            const el = document.createElement('div');
            el.className = "p-3 border-2 border-pink rounded-4 cursor-pointer shadow-sm bg-white";
            el.innerHTML = `<img src="${mediaUrl}" style="width:150px" class="rounded-3">`;
            el.onclick = () => { 
                el.style.background="#e8f5e9"; 
                el.classList.add('animate__animated', 'animate__pulse');
                count++; 
                if(count==2) finishLevel(); // Trigger the integrated finish logic
            };
            container.appendChild(el);
        });
    }

    window.onload = () => {
        if (mode === 'js_game') {
            title.innerText = "🚀 Activity: {{ lesson.title }}";
            const script = document.createElement('script');
            script.src = mediaUrl;
            script.onload = () => { if (typeof startNeuroGame === "function") startNeuroGame(container, finishLevel); };
            document.head.appendChild(script);
        } 
        else if (mode === 'matching') initMatching();
        else {
            title.innerText = "{{ lesson.title }}";
            instruction.innerText = "Watch the lesson to earn stars!";
        }
    };
</script>

<style>
    .bg-soft-pink { background-color: #fdf2f5; }
    .text-pink { color: #f06292 !important; }
    .btn-pink { background-color: #f06292; color: white; border: none; }
    .btn-pink:hover { background-color: #ec407a; color: white; transform: scale(1.05); }
    .min-vh-50 { min-height: 50vh; }
    .cursor-pointer { cursor: pointer; }
</style>
{% endblock %}
