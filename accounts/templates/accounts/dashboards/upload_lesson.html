{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="bg-pink p-4 text-white text-center">
                    <h2 class="fw-bold mb-0">🚀 Create New Content</h2>
                    <p class="mb-0">Upload media and set up interactive activities</p>
                </div>
                
                <div class="card-body p-4 p-lg-5">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">Lesson Title</label>
                            <input type="text" name="title" class="form-control rounded-pill border-2" placeholder="e.g., Identifying Emotions" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold text-dark">Skill Category</label>
                                <select name="skill_category" class="form-select rounded-pill border-2" required>
                                    <option value="communication">🗣️ Communication</option>
                                    <option value="social">🤝 Social Skills</option>
                                    <option value="motor">🏃 Motor Skills</option>
                                    <option value="daily_living">🏠 Daily Living</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold text-dark">Difficulty Level</label>
                                <select name="difficulty_level" class="form-select rounded-pill border-2" required>
                                    <option value="beginner">🟢 Beginner</option>
                                    <option value="intermediate">🟡 Intermediate</option>
                                    <option value="advanced">🔴 Advanced</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold text-dark">Media Type</label>
                                <select name="content_type" class="form-select rounded-pill border-2">
                                    <option value="video">🎥 Video Lesson</option>
                                    <option value="audio">🎵 Audio/Sound Clip</option>
                                    <option value="animation">✨ Animated Content</option>
                                    <option value="image_set">🖼️ Image Set</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold text-dark">Activity Template</label>
                                <select name="activity_type" class="form-select rounded-pill border-2">
                                    <option value="none">📖 General Lesson</option>
                                    <option value="shuffling">🃏 Card Shuffling</option>
                                    <option value="matching">🧩 Matching Game</option>
                                    <option value="sequencing">🔢 Sequencing Task</option>
                                    <option value="drag_drop">🖱️ Drag and Drop</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">Upload Primary File</label>
                            <input type="file" name="file" class="form-control rounded-4 border-2" required>
                            <small class="text-muted">Upload your video, mp3, or image assets here.</small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">Cover Thumbnail</label>
                            <input type="file" name="thumbnail" class="form-control rounded-4 border-2">
                        </div>

                        <div class="text-center pt-3">
                            <button type="submit" class="btn btn-pink btn-lg px-5 rounded-pill shadow fw-bold">
                                Submit for Admin Approval
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
